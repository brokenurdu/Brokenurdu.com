<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>broken_urdu</title>
<meta name="description" content="broken_urdu — stories in two scripts, one voice.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ============================================
     ANIMATABLE CUSTOM PROPERTIES
     registering these lets the browser smoothly
     tween accent colors whenever JS updates them
     on chapter change (no @property = instant jump)
     ============================================ */
  @property --accent{ syntax:'<color>'; inherits:true; initial-value:#D8AC53; }
  @property --accent-2{ syntax:'<color>'; inherits:true; initial-value:#F2D48A; }

  /* ============================================
     TOKENS
     ============================================ */
  :root{
    --ink:      #0A0A0B;
    --ink-2:    #131311;
    --panel:    rgba(19, 18, 16, 0.55);
    --panel-solid: rgba(16, 15, 14, 0.88);
    --panel-border: rgba(180, 148, 98, 0.16);
    --bone:     #EDE6D6;
    --bone-dim: #B7AE9C;
    --ember:    #6E5A3F;
    --ember-dim:#3A2F20;
    --ember-glow: #C9A167;
    --gold:     #D9BC85;
    --line:     #2B2823;

    --accent:   #C4A06A;
    --accent-2: #E3CD9C;

    --f-urdu:  'Noto Nastaliq Urdu', serif;
    --f-body:  'Lora', Georgia, serif;
    --f-mono:  'JetBrains Mono', monospace;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--bone);
    font-family:var(--f-body);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    position:relative;
    overflow-x:hidden;
  }
  body.loading{overflow:hidden;}
  a{color:inherit;}
  ::selection{background:var(--ember-dim); color:var(--bone);}

  /* ============================================
     ATMOSPHERE — two crossfading gradient layers,
     a canvas particle field, an aurora overlay
     (part 7 only), grain and vignette.
     Opacity is the only thing ever transitioned
     here, so the crossfade is butter-smooth in
     every browser regardless of gradient support.
     ============================================ */
  .atmosphere{position:fixed; inset:0; z-index:-5; pointer-events:none; overflow:hidden;}
  .atmo-layer{
    position:absolute; inset:-2% -2%;
    transition:opacity 1.8s ease;
    opacity:0;
  }
  .atmo-layer.is-active{opacity:1;}

  .aurora-layer{
    position:fixed; inset:-15% -15%; z-index:-4;
    pointer-events:none;
    opacity:0;
    mix-blend-mode:screen;
    filter:blur(46px);
    background:
      repeating-linear-gradient(102deg,
        rgba(201,182,255,0.28) 0%,
        rgba(241,232,255,0.14) 7%,
        rgba(130,210,225,0.16) 14%,
        transparent 24%);
    animation:auroraDrift 22s ease-in-out infinite alternate;
    animation-play-state:paused;
    transition:opacity 1.8s ease;
  }
  body[data-theme="7"] .aurora-layer{opacity:0.55; animation-play-state:running;}
  @keyframes auroraDrift{
    0%{ transform:translate(-4%, 0) rotate(0deg); }
    100%{ transform:translate(4%, -3%) rotate(1.2deg); }
  }

  #particles{position:fixed; inset:0; z-index:-3; pointer-events:none;}

  .grain{
    position:fixed; inset:0; z-index:-2;
    pointer-events:none;
    opacity:0.5;
    mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/></svg>");
  }
  .vignette{
    position:fixed; inset:0; z-index:-1;
    pointer-events:none;
    background:radial-gradient(ellipse 90% 80% at 50% 45%, transparent 55%, rgba(0,0,0,0.45) 100%);
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
    #particles{display:none;}
  }

  :focus-visible{outline:2px solid var(--accent); outline-offset:3px;}

  /* ============================================
     LOADER
     ============================================ */
  .loader{
    position:fixed; inset:0; z-index:999;
    display:flex; align-items:center; justify-content:center;
    background:#0A0A0B;
    transition:opacity .8s ease, visibility .8s ease;
  }
  .loader.hidden{opacity:0; visibility:hidden; pointer-events:none;}
  .loader-title{
    font-family:var(--f-mono);
    font-weight:500;
    font-size:clamp(24px, 6vw, 42px);
    color:var(--bone);
    letter-spacing:-0.01em;
  }
  .loader-title span{
    display:inline-block;
    opacity:0;
    transform:translateY(10px);
    animation:loaderMend 700ms ease forwards;
    animation-delay:calc(var(--i) * 35ms);
  }
  .loader-title .brk{
    background:linear-gradient(120deg, var(--ember-glow), var(--ember) 60%, var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  @keyframes loaderMend{ to{ opacity:1; transform:translateY(0); } }

  /* ============================================
     READING PROGRESS + CHAPTER PILL
     ============================================ */
  .progress-track{
    position:fixed; top:0; left:0; right:0; height:3px;
    background:rgba(255,255,255,0.06);
    z-index:60;
  }
  .progress-fill{
    height:100%; width:0%;
    background:linear-gradient(90deg, var(--accent), var(--accent-2));
    transition:width .1s linear, background 1.8s ease;
  }
  .chapter-pill{
    position:fixed; left:16px; bottom:16px; z-index:60;
    display:flex; align-items:flex-start; gap:10px;
    padding:9px 16px;
    border:1px solid var(--panel-border);
    background:var(--panel);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-radius:16px;
    font-family:var(--f-mono);
    font-size:11px;
    letter-spacing:0.04em;
    color:var(--bone-dim);
    max-width:calc(100vw - 32px);
    opacity:0;
    transform:translateY(8px);
    transition:opacity .5s ease, transform .5s ease, border-color 1.8s ease;
    pointer-events:none;
  }
  .chapter-pill.visible{opacity:1; transform:translateY(0);}
  .chapter-pill .num{color:var(--accent); font-weight:600; white-space:nowrap; transition:color 1.8s ease;}
  .chapter-pill .mood{color:var(--bone); white-space:normal; line-height:1.3;}
  @media (max-width:520px){
    .chapter-pill{max-width:calc(100vw - 24px);}
    .chapter-pill .mood{font-size:10.5px;}
  }

  /* ============================================
     LAYOUT SHELL
     ============================================ */
  .wrap{
    max-width:700px;
    margin:0 auto;
    padding:0 24px;
    position:relative;
  }

  header.site{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 24px;
    margin-top:16px;
    border:1px solid var(--panel-border);
    background:var(--panel);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-radius:3px;
    font-family:var(--f-mono);
    font-size:13px;
    letter-spacing:0.02em;
    color:var(--bone-dim);
    box-shadow:inset 0 -1px 0 rgba(196,160,106,0.16);
    transition:box-shadow 1.8s ease;
    scroll-snap-align:none;
  }
  header.site nav a{
    position:relative;
    text-decoration:none;
    margin-left:20px;
    color:var(--bone-dim);
    -webkit-tap-highlight-color:transparent;
    transition:color .3s ease, opacity .15s ease, transform .15s ease;
  }
  header.site nav a::after{
    content:"";
    position:absolute; left:0; right:100%; bottom:-3px; height:1px;
    background:var(--accent);
    transition:right .3s ease, background 1.8s ease;
  }
  header.site nav a:hover{color:var(--bone);}
  header.site nav a:hover::after{right:0;}
  header.site nav a:active{opacity:0.6; transform:scale(0.97);}
  header.site .mark{color:var(--bone); font-weight:500;}

  /* ============================================
     HERO — the fractured wordmark (signature element)
     ============================================ */
  .hero{
    padding:80px 0 64px;
    text-align:center;
    position:relative;
    scroll-snap-align:start;
  }

  .fracture-title{
    font-family:var(--f-mono);
    font-weight:500;
    font-size:clamp(26px, 5.2vw, 44px);
    letter-spacing:-0.01em;
    margin:0 0 18px;
    white-space:nowrap;
    color:var(--bone);
  }
  .fracture-title span{
    display:inline-block;
    opacity:0;
    transform:translate(var(--dx,0), var(--dy,0)) rotate(var(--dr,0deg));
    animation:mend 900ms cubic-bezier(.2,.8,.2,1) forwards;
    animation-delay:calc(var(--i) * 28ms);
  }
  .fracture-title .brk{
    background:linear-gradient(120deg, var(--ember-glow), var(--ember) 60%, var(--gold));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  @keyframes mend{
    to{ opacity:1; transform:translate(0,0) rotate(0deg); }
  }

  .hero .tagline{
    font-family:var(--f-urdu);
    direction:rtl;
    font-size:26px;
    color:var(--bone-dim);
    margin:0 0 10px;
    opacity:0;
    animation:fadeUp 700ms ease forwards;
    animation-delay:1.05s;
  }
  .hero .tagline-en{
    font-family:var(--f-mono);
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--bone-dim);
    opacity:0;
    animation:fadeUp 700ms ease forwards;
    animation-delay:1.2s;
  }
  @keyframes fadeUp{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }

  .hero .insta{
    position:relative;
    overflow:hidden;
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:28px;
    padding:9px 18px;
    border:1px solid var(--line);
    border-radius:2px;
    font-family:var(--f-mono);
    font-size:13px;
    text-decoration:none;
    color:var(--bone);
    opacity:0;
    animation:fadeUp 700ms ease forwards;
    animation-delay:1.35s;
    transition:border-color .2s ease, color .2s ease;
  }
  .hero .insta:hover{border-color:var(--ember-glow); color:var(--ember-glow);}
  .hero .insta:active{transform:scale(0.96);}

  .ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(196,160,106,0.4);
    transform:scale(0);
    opacity:.6;
    animation:rippleAnim .6s ease-out forwards;
    pointer-events:none;
  }
  @keyframes rippleAnim{ to{ transform:scale(5); opacity:0; } }

  /* ============================================
     ABOUT
     ============================================ */
  .about{
    padding:32px 28px;
    margin-bottom:8px;
    border:1px solid var(--panel-border);
    background:var(--panel-solid);
    border-radius:3px;
    color:var(--bone-dim);
    font-size:15px;
    scroll-snap-align:start;
  }
  .about p{margin:0 0 12px;}
  .about strong{color:var(--bone); font-weight:600;}

  /* ============================================
     FEED
     ============================================ */
  .feed-heading{
    font-family:var(--f-mono);
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--bone-dim);
    margin:56px 0 24px;
  }

  /* ============================================
     STORIES HUB (list of stories) + READER
     ============================================ */
  .stories-hub{scroll-margin-top:24px;}
  body.reading .hero, body.reading .about{display:none;}
  body.reading header.site{justify-content:center;}
  body.reading header.site nav{display:none;}
  .stories-hub.hidden, .story-reader{display:none;}
  .story-reader.active{display:block;}

  @keyframes hubFlicker{
    0%, 100%{opacity:1;}
    10%{opacity:0.35;}
    20%{opacity:1;}
    32%{opacity:0.4;}
    42%{opacity:1;}
    60%{opacity:1;}
  }
  .stories-hub.flicker .feed-heading{
    animation:hubFlicker 900ms ease-in-out;
  }
  .stories-hub.flicker .story-list{
    animation:hubGlow 900ms ease-in-out;
  }
  @keyframes hubGlow{
    0%{box-shadow:0 0 0 rgba(196,160,106,0);}
    35%{box-shadow:0 0 0 rgba(196,160,106,0);}
    45%{box-shadow:0 0 34px -6px rgba(196,160,106,0.55);}
    100%{box-shadow:0 0 0 rgba(196,160,106,0);}
  }

  .story-list{
    display:grid;
    gap:16px;
  }
  .story-card{
    position:relative;
    overflow:hidden;
    display:block;
    width:100%;
    text-align:left;
    padding:28px;
    border:1px solid var(--panel-border);
    background:var(--panel-solid);
    border-radius:5px;
    cursor:pointer;
    font-family:inherit;
    color:inherit;
    -webkit-tap-highlight-color:transparent;
    transition:border-color .3s ease, transform .15s ease, box-shadow .3s ease;
    isolation:isolate;
  }
  .story-card:hover, .story-card:focus-visible{
    border-color:var(--accent);
    transform:translateY(-2px);
    box-shadow:0 18px 40px -20px rgba(0,0,0,0.55);
    outline:none;
  }
  .story-card:active{
    transform:translateY(-1px) scale(0.985);
    border-color:var(--accent);
  }
  .story-card::before{
    content:"";
    position:absolute; inset:0;
    border-radius:inherit;
    background:radial-gradient(320px circle at var(--mx,50%) var(--my,50%), rgba(196,160,106,0.14), transparent 70%);
    opacity:0;
    transition:opacity .4s ease;
    pointer-events:none;
    z-index:0;
  }
  .story-card:hover::before{opacity:1;}
  .story-card > *{position:relative; z-index:1;}
  .story-card-title{
    font-family:var(--f-body);
    font-style:italic;
    font-size:24px;
    color:var(--bone);
    margin:0 0 6px;
  }
  .story-card-title .en{
    display:block;
    font-family:var(--f-mono);
    font-style:normal;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--accent);
    margin-top:6px;
  }
  .story-card-summary{
    font-family:var(--f-body);
    font-style:italic;
    font-size:14px;
    line-height:1.6;
    color:var(--bone-dim);
    margin:0 0 10px;
  }
  .story-card-summary:last-of-type{margin-bottom:0;}
  .story-card-tap{
    display:inline-block;
    margin-top:16px;
    font-family:var(--f-mono);
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--accent);
  }

  .part-list-view{display:none;}
  .part-list-view.active{display:block;}
  .part-list-view .story-list{margin-top:4px;}
  .part-card-num{
    display:block;
    font-family:var(--f-mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--accent);
    margin:0 0 8px;
  }

  .reader-back{
    position:relative;
    overflow:hidden;
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin:0 0 28px;
    padding:8px 16px;
    border:1px solid var(--line);
    border-radius:2px;
    background:transparent;
    font-family:var(--f-mono);
    font-size:12px;
    letter-spacing:0.04em;
    color:var(--bone-dim);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:border-color .2s ease, color .2s ease, transform .15s ease;
  }
  .reader-back:hover{border-color:var(--accent); color:var(--bone);}
  .reader-back:active{transform:scale(0.96);}

  .reader-toc{
    display:flex;
    gap:8px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:thin;
    padding:2px 2px 12px;
    margin:0 0 24px;
  }
  .reader-toc::-webkit-scrollbar{height:3px;}
  .reader-toc::-webkit-scrollbar-thumb{background:var(--panel-border); border-radius:2px;}
  .reader-toc-btn{
    position:relative;
    overflow:hidden;
    flex:0 0 auto;
    padding:7px 15px;
    border:1px solid var(--line);
    border-radius:20px;
    background:transparent;
    font-family:var(--f-mono);
    font-size:11px;
    letter-spacing:0.04em;
    white-space:nowrap;
    color:var(--bone-dim);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:border-color .2s ease, color .2s ease, background .2s ease, transform .15s ease;
  }
  .reader-toc-btn:hover{border-color:var(--accent); color:var(--bone);}
  .reader-toc-btn:active{transform:scale(0.95);}
  .reader-toc-btn.active{border-color:var(--accent); color:var(--bone); background:var(--panel);}

  .story-next-btn{
    position:relative;
    overflow:hidden;
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-top:24px;
    padding:10px 18px;
    border:1px solid var(--line);
    border-radius:2px;
    background:transparent;
    font-family:var(--f-mono);
    font-size:12px;
    letter-spacing:0.04em;
    color:var(--accent);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:border-color .2s ease, background .2s ease, transform .15s ease;
  }
  .story-next-btn:hover{border-color:var(--accent); background:var(--panel);}
  .story-next-btn:active{transform:scale(0.96);}

  /* ============================================
     STORIES
     ============================================ */
  .story{
    position:relative;
    padding:36px 28px 36px 28px;
    margin-bottom:20px;
    border:1px solid var(--panel-border);
    background:var(--panel-solid);
    border-radius:5px;
    transition:border-color .4s ease, transform .4s ease, box-shadow .4s ease;
    isolation:isolate;
    content-visibility:auto;
    contain-intrinsic-size:auto 1400px;
    contain:layout style paint;
  }
  .story:hover{
    border-color:var(--accent);
    transform:translateY(-2px);
    box-shadow:0 18px 40px -20px rgba(0,0,0,0.55);
  }
  .story::before{
    content:"";
    position:absolute; inset:0;
    border-radius:inherit;
    background:radial-gradient(320px circle at var(--mx,50%) var(--my,50%), rgba(196,160,106,0.14), transparent 70%);
    opacity:0;
    transition:opacity .4s ease;
    pointer-events:none;
    z-index:0;
  }
  .story:hover::before{opacity:1;}
  .story > *{position:relative; z-index:1;}

  .story-meta{
    display:flex;
    justify-content:flex-start;
    align-items:baseline;
    gap:14px;
    font-family:var(--f-mono);
    font-size:12px;
    color:var(--bone-dim);
    margin-bottom:16px;
  }
  .story-meta .part{
    color:var(--accent);
    letter-spacing:0.06em;
    text-transform:uppercase;
    transition:color 1.8s ease;
  }
  .story-meta .read-time::before{
    content:"·";
    margin-right:14px;
    color:var(--line);
  }
  .story-title{
    font-family:var(--f-urdu);
    direction:rtl;
    font-size:24px;
    color:var(--bone);
    margin:0 0 4px;
  }
  .story-title .en{
    display:block;
    direction:ltr;
    text-align:left;
    font-family:var(--f-mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--bone-dim);
    margin-top:6px;
    margin-bottom:20px;
  }
  .story-title.roman{
    direction:ltr;
    text-align:left;
    font-family:var(--f-body);
    font-style:italic;
    font-size:26px;
  }
  .story-title.roman .en{
    text-align:left;
    margin-top:8px;
    font-family:var(--f-body);
    font-style:normal;
    text-transform:none;
    letter-spacing:0;
    font-size:14px;
    color:var(--accent);
    transition:color 1.8s ease;
  }
  .story-title span.word{
    display:inline-block;
    opacity:0;
    filter:blur(6px);
    transform:translateY(10px);
    animation:wordReveal 650ms ease forwards;
    animation-delay:calc(var(--wi,0) * 55ms);
  }
  @keyframes wordReveal{
    to{ opacity:1; filter:blur(0); transform:translateY(0); }
  }

  .story-body{
    font-family:var(--f-body);
    font-size:16px;
    line-height:1.9;
    color:var(--bone);
  }
  .story-body p{
    margin:0 0 16px;
    opacity:0;
    filter:blur(6px);
    transform:translateY(16px);
    transition:opacity .7s ease, filter .7s ease, transform .7s ease;
  }
  .story-body p.seen{opacity:1; filter:blur(0); transform:translateY(0);}
  .story-body p:last-child{margin-bottom:0;}
  .story-continues{
    margin-top:20px;
    font-family:var(--f-mono);
    font-size:12px;
    color:var(--bone-dim);
    border-top:1px solid var(--line);
    padding-top:14px;
  }

  /* ============================================
     FOOTER
     ============================================ */
  footer{
    padding:48px 0 64px;
    text-align:center;
    font-family:var(--f-mono);
    font-size:12px;
    color:var(--bone-dim);
  }
  footer a{
    text-decoration:underline;
    text-underline-offset:3px;
    transition:color .3s ease;
  }
  footer a:hover{color:var(--accent);}

  /* ============================================
     RESPONSIVE
     ============================================ */
  @media (max-width:520px){
    .fracture-title{font-size:7vw;}

  /* ---------------- helpers ---------------- */

  function escapeText(str){ return str; } // textContent used everywhere, no HTML escaping needed

  function themeFor(i){ return THEMES[i % THEMES.length]; }

  function buildBgCss(t){
    return 'radial-gradient(ellipse 900px 500px at 50% -10%, ' + t.glowA + ', transparent 60%),' +
           'radial-gradient(ellipse 700px 600px at 85% 30%, ' + t.glowB + ', transparent 65%),' +
           'radial-gradient(ellipse 600px 500px at 8% 65%, ' + t.glowC + ', transparent 60%),' +
           'linear-gradient(180deg, ' + t.bg1 + ' 0%, ' + t.bg2 + ' 40%, ' + t.bg3 + ' 100%)';
  }

  /* ---------------- render story feed ---------------- */

  function wrapWords(text){
    // returns a DocumentFragment of the text split into
    // <span class="word"> pieces for a staggered reveal
    const frag = document.createDocumentFragment();
    const words = text.split(' ');
    words.forEach((w, i) => {
      const span = document.createElement('span');
      span.className = 'word';
      span.style.setProperty('--wi', i);
      span.textContent = w + (i < words.length - 1 ? '\u00A0' : '');
      frag.appendChild(span);
    });
    return frag;
  }

  function estimateReadTime(body){
    const words = body.join(' ').trim().split(/\s+/).filter(Boolean).length;
    return Math.max(1, Math.round(words / 200));
  }

  function renderStoryList(){
    const list = document.getElementById('storyList');
    list.innerHTML = '';

    STORY_COLLECTIONS.forEach((collection) => {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'story-card';
      card.dataset.storyId = collection.id;

      const title = document.createElement('h3');
      title.className = 'story-card-title';
      title.textContent = collection.titleUrdu;
      if(collection.titleEn){
        const en = document.createElement('span');
        en.className = 'en';
        en.textContent = collection.titleEn;
        title.appendChild(en);
      }
      card.appendChild(title);

      if(collection.summary){
        const lines = Array.isArray(collection.summary) ? collection.summary : [collection.summary];
        lines.forEach(line => {
          const summary = document.createElement('p');
          summary.className = 'story-card-summary';
          summary.textContent = line;
          card.appendChild(summary);
        });
      }

      const tap = document.createElement('span');
      tap.className = 'story-card-tap';
      tap.textContent = 'tap to read ↗';
      card.appendChild(tap);

      card.addEventListener('click', () => openPartList(collection));
      initRipple(card);
      list.appendChild(card);
    });
  }

  function renderPartList(collection){
    const list = document.getElementById('partList');
    list.innerHTML = '';
    document.getElementById('partListHeading').textContent = collection.titleUrdu;

    collection.parts.forEach((s, idx) => {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'story-card part-card';

      const num = document.createElement('span');
      num.className = 'part-card-num';
      num.textContent = s.part;
      card.appendChild(num);

      const title = document.createElement('h3');
      title.className = 'story-card-title';
      title.textContent = s.titleUrdu;
      if(s.titleEn){
        const en = document.createElement('span');
        en.className = 'en';
        en.textContent = s.titleEn;
        title.appendChild(en);
      }
      card.appendChild(title);

      const tap = document.createElement('span');
      tap.className = 'story-card-tap';
      tap.textContent = 'tap to read ↗';
      card.appendChild(tap);

      card.addEventListener('click', () => openReaderAtPart(collection, idx));
      initRipple(card);
      list.appendChild(card);
    });
  }

  let readerObservers = [];

  function jumpToPart(idx){
    const articles = document.querySelectorAll('#storyFeed .story');
    const target = articles[idx];
    if(target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderReaderToc(parts){
    const toc = document.getElementById('readerToc');
    toc.innerHTML = '';
    parts.forEach((s, idx) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'reader-toc-btn';
      btn.dataset.idx = idx;
      btn.textContent = s.part;
      btn.addEventListener('click', () => jumpToPart(idx));
      initRipple(btn);
      toc.appendChild(btn);
    });
  }

  function openPartList(collection){
    renderPartList(collection);

    document.body.classList.add('reading');
    document.getElementById('stories').classList.add('hidden');
    document.getElementById('storyReader').classList.remove('active');
    const partListView = document.getElementById('partListView');
    partListView.classList.add('active');

    initCardGlow();
    partListView.scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.getElementById('partListBack').focus({ preventScroll: true });
  }

  function openReaderAtPart(collection, startIdx){
    renderStories(collection.parts);
    renderReaderToc(collection.parts);

    document.getElementById('partListView').classList.remove('active');
    const reader = document.getElementById('storyReader');
    reader.classList.add('active');

    // (re)attach observers + interactions to the freshly rendered parts
    readerObservers.forEach(o => o.disconnect());
    readerObservers = initObservers();
    initCardGlow();
    setTheme(startIdx, true);

    reader.scrollIntoView({ behavior: 'smooth', block: 'start' });
    updateProgress();
    document.getElementById('readerBack').focus({ preventScroll: true });

    if(startIdx > 0){
      requestAnimationFrame(() => jumpToPart(startIdx));
    }
  }

  function backToPartList(){
    readerObservers.forEach(o => o.disconnect());
    readerObservers = [];

    document.getElementById('storyReader').classList.remove('active');

    updateProgress();

      const partSpan = document.createElement('span');
      partSpan.className = 'part';
      partSpan.textContent = s.part;
      const readSpan = document.createElement('span');
      readSpan.className = 'read-time';
      readSpan.textContent = estimateReadTime(s.body) + ' min read';
      meta.appendChild(partSpan);
      meta.appendChild(readSpan);
      article.appendChild(meta);

      const h2 = document.createElement('h2');
      h2.className = 'story-title' + (s.roman ? ' roman' : '');
      h2.appendChild(wrapWords(s.titleUrdu));
      if(s.titleEn){
        const en = document.createElement('span');
        en.className = 'en';
        en.appendChild(wrapWords(s.titleEn));
        h2.appendChild(en);
      }
      article.appendChild(h2);

      const bodyDiv = document.createElement('div');
      bodyDiv.className = 'story-body';
      s.body.forEach((para, pi) => {
        const p = document.createElement('p');
        p.style.transitionDelay = (pi % 6) * 70 + 'ms';
        p.textContent = para;
        bodyDiv.appendChild(p);
      });
      article.appendChild(bodyDiv);

      if(idx < storyParts.length - 1){
        const nextBtn = document.createElement('button');
        nextBtn.type = 'button';
        nextBtn.className = 'story-next-btn';
        nextBtn.textContent = 'Next: ' + storyParts[idx + 1].part + ' →';
        nextBtn.addEventListener('click', () => jumpToPart(idx + 1));
        initRipple(nextBtn);
        article.appendChild(nextBtn);
      }

      if(s.continues){
        const cont = document.createElement('div');
        cont.className = 'story-continues';
        cont.textContent = s.continues;
        article.appendChild(cont);
      }

      feed.appendChild(article);
    });
  }

  /* ---------------- fracture-title build (hero + loader) ---------------- */

  function buildFractureTitle(el, textClass){
    const text = "broken_urdu";
    el.innerHTML = '';
    text.split('').forEach((ch, i) => {
      const s = document.createElement('span');
      s.textContent = ch === ' ' ? '\u00A0' : ch;
      if (i < 6) s.classList.add('brk'); // "broken"
      if(textClass === 'hero'){
        const dx = (Math.random() * 60 - 30).toFixed(1) + 'px';
        const dy = (Math.random() * 40 - 20).toFixed(1) + 'px';
        const dr = (Math.random() * 40 - 20).toFixed(1) + 'deg';
        s.style.setProperty('--dx', dx);
        s.style.setProperty('--dy', dy);
        s.style.setProperty('--dr', dr);
      }
      s.style.setProperty('--i', i);
      el.appendChild(s);
    });
  }

  /* ---------------- atmosphere crossfade ---------------- */

  let activeLayer = 'A';
  let currentThemeIdx = -1;

  function applyAtmosphere(t, immediate){
    const layerShow = document.getElementById('atmo' + (activeLayer === 'A' ? 'B' : 'A'));
    const layerHide = document.getElementById('atmo' + activeLayer);
    layerShow.style.background = buildBgCss(t);
    if(immediate){
      layerHide.style.transition = 'none';
      layerShow.style.transition = 'none';
    }
    layerShow.classList.add('is-active');
    layerHide.classList.remove('is-active');
    if(immediate){
      requestAnimationFrame(() => {
        layerHide.style.transition = '';
        layerShow.style.transition = '';
      });
    }
    activeLayer = activeLayer === 'A' ? 'B' : 'A';

    document.documentElement.style.setProperty('--accent', t.accent);
    document.documentElement.style.setProperty('--accent-2', t.accent2);

    currentParticleTheme = t;
  }

  function setTheme(idx, immediate){
    if(idx === currentThemeIdx) return;
    currentThemeIdx = idx;
    const t = themeFor(idx);

    document.body.dataset.theme = (idx % THEMES.length) + 1;
    applyAtmosphere(t, immediate);

    const story = STORIES[idx];
    document.getElementById('chapterNum').textContent = story.part;
    document.getElementById('chapterMood').textContent = story.titleEn || story.titleUrdu;
  }

  function applyHubAtmosphere(){
    currentThemeIdx = -1;
    delete document.body.dataset.theme;
    applyAtmosphere(HUB_THEME, true);
    if(!prefersReduced) initParticles();
    document.getElementById('chapterPill').classList.remove('visible');
  }

  /* ---------------- particle engine ---------------- */

  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let currentParticleTheme = HUB_THEME;
  const isSmallScreen = window.innerWidth < 700;
  const MAX_PARTICLES = isSmallScreen ? 10 : 18;

  function rand(min, max){ return Math.random() * (max - min) + min; }

  function resizeCanvas(){
    const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function spawnParticle(p){
    const cfg = currentParticleTheme.particles;
    p = p || {};
    p.shape = cfg.shape;
    p.behavior = cfg.behavior;
    p.color = cfg.colors[Math.floor(Math.random() * cfg.colors.length)];
    p.size = rand(cfg.size[0], cfg.size[1]);
    p.speed = rand(cfg.speed[0], cfg.speed[1]);
    p.driftAmt = rand(cfg.drift[0], cfg.drift[1]);
    p.opacityPeak = rand(cfg.opacity[0], cfg.opacity[1]);
    p.phase = Math.random() * Math.PI * 2;
    p.x = Math.random() * window.innerWidth;

    if(p.behavior === 'rise'){
      p.y = window.innerHeight + rand(0, 40);
    } else if(p.behavior === 'fall'){
      p.y = -rand(0, 40);
    } else { // drift
      p.y = Math.random() * window.innerHeight;
    }
    return p;
  }

  function initParticles(){
    particles = [];
    if(prefersReduced) return;
    for(let i = 0; i < MAX_PARTICLES; i++){
      particles.push(spawnParticle({}));
    }
  }

  function drawParticle(p, t){
    ctx.globalAlpha = p.opacityPeak * (0.82 + 0.18 * Math.sin(p.phase + t * 0.00025));
    if(p.shape === 'line'){
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + p.driftAmt * 0.15, p.y - p.size);
      ctx.stroke();
    } else {
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      grd.addColorStop(0, p.color);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function stepParticle(p, dt){
    const drift = Math.sin(p.phase + performance.now() * 0.00022) * p.driftAmt * dt;
    if(p.behavior === 'rise'){
      p.y -= p.speed * dt * 6;
      p.x += drift * 0.22;
      if(p.y < -20) spawnParticle(p);
    } else if(p.behavior === 'fall'){
      p.y += p.speed * dt * 6;
      p.x += drift * 0.22;
      if(p.y > window.innerHeight + 20) spawnParticle(p);
    } else { // drift (fog / mist blobs)
      p.x += p.driftAmt * dt * 3;
      p.y += Math.sin(p.phase + performance.now() * 0.00012) * dt * 2;
      if(p.driftAmt >= 0 && p.x - p.size > window.innerWidth) p.x = -p.size;
      if(p.driftAmt < 0 && p.x + p.size < 0) p.x = window.innerWidth + p.size;
    }
  }

  let lastFrame = performance.now();
  function animate(now){
    requestAnimationFrame(animate);
    const dt = Math.min((now - lastFrame) / 16.67, 1.5);
    lastFrame = now;
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    particles.forEach(p => { stepParticle(p, dt); drawParticle(p, now); });
  }

  /* ---------------- reading progress ---------------- */

  function updateProgress(){
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    document.getElementById('progressFill').style.width = pct + '%';
  }

  /* ---------------- chapter + paragraph observers ---------------- */

  function initObservers(){
    const pill = document.getElementById('chapterPill');
    const chapterObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting){
          const idx = parseInt(entry.target.dataset.themeIndex, 10);
          setTheme(idx, false);
          pill.classList.add('visible');
          document.querySelectorAll('.reader-toc-btn').forEach(b => {
            b.classList.toggle('active', parseInt(b.dataset.idx, 10) === idx);
          });
        }
      });
    }, { rootMargin: '-42% 0px -42% 0px', threshold: 0 });

    document.querySelectorAll('.story').forEach(article => {
      chapterObserver.observe(article);
    });

    const paraObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting){
          entry.target.classList.add('seen');
          paraObserver.unobserve(entry.target);
        }
      });
    }, { rootMargin: '0px 0px -8% 0px', threshold: 0.1 });

    document.querySelectorAll('.story-body p').forEach(p => paraObserver.observe(p));

    if(prefersReduced){
      document.querySelectorAll('.story-body p').forEach(p => p.classList.add('seen'));
    }

    return [chapterObserver, paraObserver];
  }

  /* ---------------- mouse-reactive card glow ---------------- */

  function initCardGlow(){
    if(!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;
    let ticking = false;
    document.querySelectorAll('.story, .story-card').forEach(card => {
      card.addEventListener('pointermove', (e) => {
        if(ticking) return;
        ticking = true;
        requestAnimationFrame(() => {
          const rect = card.getBoundingClientRect();
          const mx = ((e.clientX - rect.left) / rect.width) * 100;
          const my = ((e.clientY - rect.top) / rect.height) * 100;
          card.style.setProperty('--mx', mx + '%');
          card.style.setProperty('--my', my + '%');
          ticking = false;
        });
      }, { passive:true });
    });
  }

  /* ---------------- magnetic + ripple buttons ---------------- */

  function initMagnetic(el, strength){
    if(prefersReduced) return;
    if(!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;
    el.addEventListener('pointermove', (e) => {
      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = (e.clientX - cx) / (rect.width / 2);
      const dy = (e.clientY - cy) / (rect.height / 2);
      el.style.transform = 'translate(' + (dx * strength) + 'px, ' + (dy * strength) + 'px)';
    });
    el.addEventListener('pointerleave', () => {
      el.style.transform = '';
    });
  }

  function initRipple(el){
    el.addEventListener('click', (e) => {
      const rect = el.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
      el.appendChild(ripple);
      setTimeout(() => ripple.remove(), 650);
    });
  }

  /* ---------------- loader ---------------- */

  function initLoader(){
    const loader = document.getElementById('loader');
    const finish = () => {
      document.body.classList.remove('loading');
      loader.classList.add('hidden');
    };
    if(prefersReduced){
      finish();
      return;
    }
    buildFractureTitle(document.getElementById('loaderTitle'), 'loader');
    window.addEventListener('load', () => setTimeout(finish, 900));
    // safety net in case load already fired or is slow to arrive
    setTimeout(finish, 2400);
  }

  /* ---------------- init ---------------- */

  function init(){
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    renderStoryList();
    buildFractureTitle(document.getElementById('fractureTitle'), 'hero');

    applyHubAtmosphere();
    if(!prefersReduced) requestAnimationFrame(animate);

    initCardGlow();
    initMagnetic(document.getElementById('heroInsta'), 6);
    initRipple(document.getElementById('heroInsta'));

    document.getElementById('readerBack').addEventListener('click', backToPartList);
    initRipple(document.getElementById('readerBack'));

    document.getElementById('partListBack').addEventListener('click', backToStories);
    initRipple(document.getElementById('partListBack'));

    document.querySelectorAll('a[href="#stories"]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        if(document.getElementById('storyReader').classList.contains('active') ||
           document.getElementById('partListView').classList.contains('active')){
          backToStories();
        } else {
          document.getElementById('stories').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        flickerStoriesHub();
      });
    });

    let scrollTicking = false;
    window.addEventListener('scroll', () => {
      if(scrollTicking) return;
      scrollTicking = true;
      requestAnimationFrame(() => { updateProgress(); scrollTicking = false; });
    }, { passive: true });
    updateProgress();

    initLoader();
  }

  init();
</script>

</body>
